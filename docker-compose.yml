services:
  app:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app

  test:
    build:
      context: .
    command: python -m pytest -q
    volumes:
      - .:/app
